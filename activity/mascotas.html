<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Mascotas</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="img/icono.png">
</head>
<body>

    <header>

        <h1>Mis Mascotas</h1>

        <nav>

            <a id="m-link"href="index.html">← Volver al Portafolio</a>

        </nav>

    </header>

    <main class="contenedor-principal">

        <section class="tarjeta">

            <div class="tarjeta-header">

                <div class="foto-perfil">
                    <img src="img/mascotas/Perro_1.webp" alt="Perro Max">
                </div>
                <h2>Max</h2>

            </div>
            <article class="tarjeta-cuerpo">
                <p>Max es un perro muy energético y le encanta jugar.</p>
            </article>
        </section>

        <section class="tarjeta">

            <div class="tarjeta-header">

                <div class="foto-perfil">
                    <img src="img/mascotas/descarga.jfif" alt="Gato Luna">
                </div>
                <h2>Luna</h2>

            </div>
            <article class="tarjeta-cuerpo">
                <p>Luna es una gata tranquila que disfruta dormir todo el día.</p>
            </article>
        </section>

        <section class="tarjeta">

            <div class="tarjeta-header">

                <div class="foto-perfil">
                    <img src="img/mascotas/perro_2.webp" alt="Perro Rocky">
                </div>

                <h2>Rocky</h2>

            </div>
            <article class="tarjeta-cuerpo">
                <p>Rocky es muy protector y siempre está atento.</p>
            </article>
        </section>

    </main>

</body>
</html>
