<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
}

nav{
    background:black;
    padding:15px;
}

/* BOTON */
#btnMenu{
    color:white;
    font-size:30px;
    cursor:pointer;
    display:block;
}

/* MENU */
ul{
    list-style:none;
    padding:0;
    margin:10px 0 0 0;
    display:none;
    flex-direction:column;
    gap:10px;
}

ul li a{
    color:white;
    text-decoration:none;
}

/* CLASE QUE MUESTRA MENU */
ul.activo{
    display:flex;
}

/* PANTALLA GRANDE */
@media (min-width: 768px){

    #btnMenu{
        display:none; /* ocultar botón */
    }

    ul{
        display:flex !important; /* mostrar menú siempre */
        flex-direction:row;
        gap:20px;
        margin:0;
    }
}
</style>
</head>
<body>

<nav>
    <div id="btnMenu">☰</div>

    <ul id="menu">
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Servicios</a></li>
        <li><a href="#">Contacto</a></li>
    </ul>
</nav>

<script>
let boton = document.getElementById("btnMenu");
let menu = document.getElementById("menu");

boton.addEventListener("click", function(){
    menu.classList.toggle("activo");
});
</script>

</body>
</html>
